name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  headless:
    name: headless unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # No install step: the game and its unit tests use only Node built-ins,
      # so the headless suite runs with zero dependencies.
      - name: Run headless tests (with negative controls)
        run: node --test tests/*.test.mjs
